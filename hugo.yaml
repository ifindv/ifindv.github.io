baseURL: https://ifindv.github.io/
languageCode: zh-cn
title: ifindv's Blog
theme: blowfish
defaultContentLanguage: zh-cn

enableRobotsTXT: true
summaryLength: 30
hasCJKLanguage: true

enableEmoji: true

pagination:
  pagerSize: 10

imaging:
  anchor: center

taxonomies:
  tag: tags
  category: categories
  author: authors
  series: series

outputs:
  home:
    - HTML
    - RSS
    - JSON

author:
  name: ifindv
  email: your.email@example.com

params:
  description: "技术分享与个人思考"
  author:
    name: "ifindv"
    image: "/img/avatar.jpg"
  defaultAppearance: "dark"
  autoSwitchAppearance: true
  enableSearch: true
  enableCodeCopy: true
  mainSections: ["posts"]

  colorScheme: "blowfish"

  header:
    layout: "fixed"

  footer:
    showCopyright: true
    showThemeAttribution: true
    showAppearanceSwitcher: true
    showScrollToTop: true

  homepage:
    layout: "background"
    showRecent: true
    showRecentItems: 6
    cardView: true
    showMoreLink: true
    showMoreLinkDest: "/posts/"

  defaultBackgroundImage: "/media/blog-bg.jpg"

  article:
    showDate: true
    showAuthor: false
    showHero: true
    heroStyle: "big"
    showBreadcrumbs: true
    showReadingTime: true
    showTableOfContents: true
    showRelatedContent: true
    relatedContentLimit: 9
    showHeadingAnchors: true
    showPagination: true
    showTaxonomies: true

  list:
    showHero: true
    heroStyle: "background"
    showSummary: true
    showTableOfContents: true
    cardView: true
    showCards: true

  taxonomy:
    showHero: true
    heroStyle: "background"
    showTermCount: true

  markup:
    highlight:
      noClasses: false
